        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: #f1f5f9;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #a855f7;
        }

        .container {
            max-width: 1100px;
            margin: auto;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
        }

        .card h2 {
            margin-top: 0;
            color: #c084fc;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-top: 10px;
        }

        .stat {
            background: #020617;
            padding: 6px;
            border-radius: 6px;
            text-align: center;
            font-size: 0.9rem;
        }

        .empty {
            text-align: center;
            margin-top: 40px;
            color: #94a3b8;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn {
            text-decoration: none;
            background: #a855f7;
            padding: 10px 15px;
            border-radius: 8px;
            color: white;
        }

        .btn:hover {
            background: #9333ea;
        }
    </style>
